version: "3.9"

networks:
  my_network:
    driver: bridge

volumes:
  mongo_data:

services:

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API=http://localhost:5000
    networks:
      - my_network
    depends_on:
      - backend
    restart: unless-stopped


  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/mydb
    networks:
      - my_network
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - my_network
    restart: unless-stopped
